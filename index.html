<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Movie Recap AI Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&display=swap');
        body { font-family: 'Noto Sans Myanmar', sans-serif; }
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <div class="max-w-4xl mx-auto p-4 sm:p-8">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-400 mb-2">🎬 Movie Recap AI Tools</h1>
            <p class="text-gray-400">ဗီဒီယိုကို စာသားပြောင်းရန်နှင့် စာသားကို အသံပြန်ပြောင်းရန်</p>
        </header>

        <div class="flex border-b border-gray-700 mb-6">
            <button onclick="switchTab('v2t')" id="tab-v2t" class="flex-1 py-3 font-semibold tab-active">Video to Text</button>
            <button onclick="switchTab('tts')" id="tab-tts" class="flex-1 py-3 font-semibold text-gray-400">Text to Speech</button>
        </div>

        <!-- Video to Text Section -->
        <div id="section-v2t" class="space-y-6">
            <div class="bg-gray-800 rounded-2xl p-6 shadow-2xl border border-gray-700">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2 text-gray-300">Google Gemini API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="AI Studio မှ API Key ကို ဤနေရာတွင်ထည့်ပါ..." class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2 text-gray-300">Video ဖိုင်ရွေးချယ်ပါ (MP4)</label>
                    <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-600 rounded-xl p-8 bg-gray-700/50 hover:bg-gray-700 transition-all cursor-pointer" id="dropZone">
                        <input type="file" id="videoInput" accept="video/mp4" class="hidden">
                        <i class="fas fa-file-video text-4xl text-blue-500 mb-3"></i>
                        <p id="fileName" class="text-gray-300 text-center text-sm">ဗီဒီယိုကို နှိပ်၍ရွေးပါ (ဖိုင်ဆိုဒ်သေးလျှင် ပိုကောင်းပါသည်)</p>
                    </div>
                </div>

                <div id="previewContainer" class="hidden mb-6">
                    <video id="videoPreview" controls class="w-full rounded-lg border border-gray-600 shadow-md"></video>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">ဘာသာစကား</label>
                        <select id="languageSelect" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white outline-none">
                            <option value="Burmese">Burmese (မြန်မာ)</option>
                            <option value="English">English</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">ရွေးချယ်မှု</label>
                        <select id="taskSelect" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white outline-none">
                            <option value="summary">ဇာတ်လမ်းအကျဉ်းချုပ် (Summary)</option>
                            <option value="full-transcript">စကားပြောအားလုံး (Transcript)</option>
                        </select>
                    </div>
                </div>

                <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
                    <span id="btnText">AI ဖြင့် စာသားပြောင်းမည်</span>
                    <div id="btnLoading" class="loading-spinner hidden"></div>
                </button>
            </div>

            <div id="resultSection" class="hidden">
                <div class="bg-gray-800 rounded-2xl p-6 shadow-2xl border border-gray-700">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-blue-400">ရလဒ် (Result)</h2>
                        <div class="flex gap-2">
                            <button id="copyBtn" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded-lg">Copy</button>
                            <button onclick="useForTTS()" class="text-xs bg-green-700 hover:bg-green-600 px-3 py-2 rounded-lg">အသံပြောင်းရန်ပို့မည်</button>
                        </div>
                    </div>
                    <div id="outputContainer" class="bg-gray-900 border border-gray-700 rounded-xl p-4 min-h-[150px] text-gray-200 whitespace-pre-wrap text-sm leading-relaxed"></div>
                </div>
            </div>
        </div>

        <!-- Text to Speech Section -->
        <div id="section-tts" class="hidden space-y-6">
            <div class="bg-gray-800 rounded-2xl p-6 shadow-2xl border border-gray-700">
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2 text-gray-300">အသံပြောင်းလိုသော စာသား</label>
                    <textarea id="ttsInput" rows="6" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-gray-200 outline-none focus:ring-2 focus:ring-blue-500" placeholder="ဤနေရာတွင် စာသားများ ရိုက်ထည့်ပါ..."></textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">အသံပုံစံ (Voice)</label>
                        <select id="voiceSelect" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white outline-none">
                            <option value="Kore">Kore (Standard)</option>
                            <option value="Zephyr">Zephyr (Cool)</option>
                            <option value="Fenrir">Fenrir (Deep)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">အသံနေအထား (Style)</label>
                        <select id="styleHint" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white outline-none">
                            <option value="normal">Normal (သာမန်)</option>
                            <option value="excited">Excited (စိတ်လှုပ်ရှားဖွယ်)</option>
                            <option value="calm">Calm (အေးဆေးစွာ)</option>
                        </select>
                    </div>
                </div>

                <button id="ttsBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
                    <span id="ttsBtnText">အသံဖိုင် ဖန်တီးမည်</span>
                    <div id="ttsBtnLoading" class="loading-spinner hidden"></div>
                </button>
            </div>

            <div id="audioResultSection" class="hidden">
                <div class="bg-gray-800 rounded-2xl p-6 shadow-2xl border border-gray-700 text-center">
                    <h2 class="text-xl font-semibold text-green-400 mb-4">အသံဖိုင် အဆင်သင့်ဖြစ်ပါပြီ</h2>
                    <audio id="audioPlayer" controls class="w-full mb-4"></audio>
                    <a id="downloadAudio" class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold no-underline">Download WAV</a>
                </div>
            </div>
        </div>

        <footer class="mt-10 text-center text-gray-500 text-xs">
            © 2026 Movie Recap AI - Powered by Gemini 2.5 Flash
        </footer>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('section-v2t').classList.toggle('hidden', tab !== 'v2t');
            document.getElementById('section-tts').classList.toggle('hidden', tab !== 'tts');
            document.getElementById('tab-v2t').className = `flex-1 py-3 font-semibold ${tab === 'v2t' ? 'tab-active' : 'text-gray-400'}`;
            document.getElementById('tab-tts').className = `flex-1 py-3 font-semibold ${tab === 'tts' ? 'tab-active' : 'text-gray-400'}`;
        }

        const videoInput = document.getElementById('videoInput');
        const dropZone = document.getElementById('dropZone');
        const fileNameDisplay = document.getElementById('fileName');
        const previewContainer = document.getElementById('previewContainer');
        const videoPreview = document.getElementById('videoPreview');
        const processBtn = document.getElementById('processBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const resultSection = document.getElementById('resultSection');
        const outputContainer = document.getElementById('outputContainer');
        let base64Video = "";

        dropZone.addEventListener('click', () => videoInput.click());
        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 20 * 1024 * 1024) {
                    alert("ဗီဒီယိုဖိုင်က ကြီးလွန်းနေပါတယ်။ 20MB အောက် ဖိုင်နဲ့ အရင်စမ်းကြည့်ပါ (Mobile Browser Limit ကြောင့်ပါ)။");
                    return;
                }
                fileNameDisplay.textContent = file.name;
                previewContainer.classList.remove('hidden');
                videoPreview.src = URL.createObjectURL(file);
                const reader = new FileReader();
                reader.onload = (ev) => base64Video = ev.target.result.split(',')[1];
                reader.readAsDataURL(file);
            }
        });

        processBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) return alert("ကျေးဇူးပြု၍ Google AI Studio မှ API Key ကို ရိုက်ထည့်ပါ။");
            if (!base64Video) return alert("Video ဖိုင်အရင်ရွေးပါ။");
            
            processBtn.disabled = true;
            btnText.textContent = "AI စဉ်းစားနေသည်...";
            btnLoading.classList.remove('hidden');
            resultSection.classList.add('hidden');

            const lang = document.getElementById('languageSelect').value;
            const task = document.getElementById('taskSelect').value;
            const prompt = `Task: ${task}. Language: ${lang}. Analyze this video carefully and provide a detailed response in Burmese. This is for a movie recap content creator.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "video/mp4", data: base64Video } }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message || "API Error");
                }

                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    outputContainer.textContent = data.candidates[0].content.parts[0].text;
                    resultSection.classList.remove('hidden');
                } else {
                    throw new Error("AI က အဖြေပြန်မပေးနိုင်ပါ။ API Key ကို စစ်ဆေးပါ သို့မဟုတ် ဗီဒီယိုကို ပြန်တင်ကြည့်ပါ။");
                }
            } catch (err) {
                alert("Error ဖြစ်သွားပါသည်- " + err.message);
            } finally {
                processBtn.disabled = false;
                btnText.textContent = "AI ဖြင့် စာသားပြောင်းမည်";
                btnLoading.classList.add('hidden');
            }
        });

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }

        document.getElementById('copyBtn').addEventListener('click', function() {
            copyToClipboard(outputContainer.innerText);
            this.textContent = "Copied!";
            setTimeout(() => this.textContent = "Copy", 2000);
        });

        function useForTTS() {
            document.getElementById('ttsInput').value = outputContainer.innerText;
            switchTab('tts');
        }

        // --- TTS Logic ---
        const ttsBtn = document.getElementById('ttsBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioResultSection = document.getElementById('audioResultSection');

        ttsBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const text = document.getElementById('ttsInput').value.trim();
            if (!apiKey) return alert("API Key အရင်ထည့်ပါ");
            if (!text) return alert("စာသားအရင်ထည့်ပါ");

            ttsBtn.disabled = true;
            document.getElementById('ttsBtnText').textContent = "အသံဖိုင် ဖန်တီးနေသည်...";
            document.getElementById('ttsBtnLoading').classList.remove('hidden');

            try {
                const voice = document.getElementById('voiceSelect').value;
                const style = document.getElementById('styleHint').value;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Style: ${style}. Text: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
                        }
                    })
                });

                const result = await response.json();
                if (result.error) throw new Error(result.error.message);

                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const mimeType = result.candidates[0].content.parts[0].inlineData.mimeType;
                const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || "24000");
                
                const wavBlob = pcmToWav(pcmData, sampleRate);
                const audioUrl = URL.createObjectURL(wavBlob);
                
                audioPlayer.src = audioUrl;
                document.getElementById('downloadAudio').href = audioUrl;
                document.getElementById('downloadAudio').download = "recap_audio.wav";
                audioResultSection.classList.remove('hidden');
            } catch (err) {
                alert("TTS Error: " + err.message);
            } finally {
                ttsBtn.disabled = false;
                document.getElementById('ttsBtnText').textContent = "အသံဖိုင် ဖန်တီးမည်";
                document.getElementById('ttsBtnLoading').classList.add('hidden');
            }
        });

        function pcmToWav(base64Pcm, sampleRate) {
            const pcmBuffer = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + pcmBuffer.byteLength, true); 
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true); 
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); 
            view.setUint16(32, 2, true); 
            view.setUint16(34, 16, true); 
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, pcmBuffer.byteLength, true);
            return new Blob([wavHeader, pcmBuffer], { type: 'audio/wav' });
        }
    </script>
</body>
</html>
