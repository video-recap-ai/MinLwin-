<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Recap & Voice Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <div class="max-w-4xl mx-auto p-4 sm:p-8">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-400 mb-2">🎬 Movie Recap AI Tools</h1>
            <p class="text-gray-400">ဗီဒီယိုကို စာသားပြောင်းရန်နှင့် စာသားကို အသံပြန်ပြောင်းရန်</p>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex border-b border-gray-700 mb-6">
            <button onclick="switchTab('v2t')" id="tab-v2t" class="flex-1 py-3 font-semibold tab-active">Video to Text</button>
            <button onclick="switchTab('tts')" id="tab-tts" class="flex-1 py-3 font-semibold text-gray-400">Text to Speech (Audio)</button>
        </div>

        <!-- Video to Text Section -->
        <div id="section-v2t" class="space-y-6">
            <div class="bg-gray-800 rounded-2xl p-6 shadow-2xl border border-gray-700">
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2 text-gray-300">Video ဖိုင်ရွေးချယ်ပါ (MP4)</label>
                    <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-600 rounded-xl p-8 bg-gray-700/50 hover:bg-gray-700 transition-all cursor-pointer" id="dropZone">
                        <input type="file" id="videoInput" accept="video/mp4" class="hidden">
                        <i class="fas fa-file-video text-4xl text-blue-500 mb-3"></i>
                        <p id="fileName" class="text-gray-300">ဗီဒီယိုဖိုင်ကို ဤနေရာတွင် ဆွဲထည့်ပါ သို့မဟုတ် နှိပ်ပါ</p>
                    </div>
                </div>

                <div id="previewContainer" class="hidden mb-6">
                    <video id="videoPreview" controls class="w-full rounded-lg border border-gray-600 shadow-md"></video>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">ဘာသာစကား</label>
                        <select id="languageSelect" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Burmese">Burmese (မြန်မာ)</option>
                            <option value="English">English</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">အမျိုးအစား</label>
                        <select id="taskSelect" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="full-transcript">စကားပြောအားလုံးကို စာသားပြောင်းရန်</option>
                            <option value="summary">ဇာတ်လမ်းအကျဉ်းချုပ် ရေးခိုင်းရန်</option>
                        </select>
                    </div>
                </div>

                <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
                    <span id="btnText">AI ဖြင့် စာသားပြောင်းမည်</span>
                    <div id="btnLoading" class="loading-spinner hidden"></div>
                </button>
            </div>

            <!-- V2T Result -->
            <div id="resultSection" class="hidden">
                <div class="bg-gray-800 rounded-2xl p-6 shadow-2xl border border-gray-700">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-blue-400">ရလဒ် (Result)</h2>
                        <div class="flex gap-2">
                            <button id="copyBtn" class="text-sm bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg">Copy ကူးမည်</button>
                            <button onclick="useForTTS()" class="text-sm bg-green-700 hover:bg-green-600 px-4 py-2 rounded-lg">အသံပြောင်းရန် ပို့မည်</button>
                        </div>
                    </div>
                    <div id="outputContainer" class="bg-gray-900 border border-gray-700 rounded-xl p-4 min-h-[150px] text-gray-200 whitespace-pre-wrap"></div>
                </div>
            </div>
        </div>

        <!-- Text to Speech Section -->
        <div id="section-tts" class="hidden space-y-6">
            <div class="bg-gray-800 rounded-2xl p-6 shadow-2xl border border-gray-700">
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2 text-gray-300">အသံပြောင်းလိုသော စာသားကို ရိုက်ထည့်ပါ</label>
                    <textarea id="ttsInput" rows="6" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-gray-200 outline-none focus:ring-2 focus:ring-blue-500" placeholder="ဤနေရာတွင် စာသားများ ရိုက်ထည့်ပါ..."></textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">အသံပုံစံ (Voice Name)</label>
                        <select id="voiceSelect" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white outline-none">
                            <option value="Kore">Kore (Standard)</option>
                            <option value="Zephyr">Zephyr (Cool)</option>
                            <option value="Fenrir">Fenrir (Deep)</option>
                            <option value="Charon">Charon (Narrator)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">အသံနေအထား (Style Hint)</label>
                        <select id="styleHint" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white outline-none">
                            <option value="excited">Excited (စိတ်လှုပ်ရှားဖွယ်)</option>
                            <option value="calm">Calm (အေးဆေးစွာ)</option>
                            <option value="whisper">Whisper (တိုးတိုးလေး)</option>
                            <option value="normal">Normal (သာမန်)</option>
                        </select>
                    </div>
                </div>

                <button id="ttsBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
                    <span id="ttsBtnText">အသံဖိုင် ဖန်တီးမည်</span>
                    <div id="ttsBtnLoading" class="loading-spinner hidden"></div>
                </button>
            </div>

            <!-- TTS Player -->
            <div id="audioResultSection" class="hidden">
                <div class="bg-gray-800 rounded-2xl p-6 shadow-2xl border border-gray-700 text-center">
                    <h2 class="text-xl font-semibold text-green-400 mb-4">အသံဖိုင် အဆင်သင့်ဖြစ်ပါပြီ</h2>
                    <audio id="audioPlayer" controls class="w-full mb-4"></audio>
                    <a id="downloadAudio" class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold">အသံဖိုင် သိမ်းမည် (Download)</a>
                </div>
            </div>
        </div>

        <footer class="mt-10 text-center text-gray-500 text-sm">
            Powered by Gemini 2.5 Flash & TTS Engine
        </footer>
    </div>

    <script>
        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Tab Management
        function switchTab(tab) {
            document.getElementById('section-v2t').classList.toggle('hidden', tab !== 'v2t');
            document.getElementById('section-tts').classList.toggle('hidden', tab !== 'tts');
            document.getElementById('tab-v2t').className = `flex-1 py-3 font-semibold ${tab === 'v2t' ? 'tab-active' : 'text-gray-400'}`;
            document.getElementById('tab-tts').className = `flex-1 py-3 font-semibold ${tab === 'tts' ? 'tab-active' : 'text-gray-400'}`;
        }

        // --- Video to Text Logic ---
        const videoInput = document.getElementById('videoInput');
        const dropZone = document.getElementById('dropZone');
        const fileNameDisplay = document.getElementById('fileName');
        const previewContainer = document.getElementById('previewContainer');
        const videoPreview = document.getElementById('videoPreview');
        const processBtn = document.getElementById('processBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const resultSection = document.getElementById('resultSection');
        const outputContainer = document.getElementById('outputContainer');
        const copyBtn = document.getElementById('copyBtn');
        let base64Video = "";

        dropZone.addEventListener('click', () => videoInput.click());
        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.textContent = file.name;
                previewContainer.classList.remove('hidden');
                videoPreview.src = URL.createObjectURL(file);
                const reader = new FileReader();
                reader.onload = (ev) => base64Video = ev.target.result.split(',')[1];
                reader.readAsDataURL(file);
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!base64Video) return alert("Video ဖိုင်ရွေးပါ");
            
            processBtn.disabled = true;
            btnText.textContent = "AI စဉ်းစားနေသည်...";
            btnLoading.classList.remove('hidden');

            const lang = document.getElementById('languageSelect').value;
            const task = document.getElementById('taskSelect').value;
            const prompt = `Task: ${task}. Language: ${lang}. Analyze the video and provide transcript/recap. For Movie Recap channel.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "video/mp4", data: base64Video } }] }]
                    })
                });
                const data = await response.json();
                outputContainer.textContent = data.candidates[0].content.parts[0].text;
                resultSection.classList.remove('hidden');
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                processBtn.disabled = false;
                btnText.textContent = "AI ဖြင့် စာသားပြောင်းမည်";
                btnLoading.classList.add('hidden');
            }
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(outputContainer.innerText);
            copyBtn.textContent = "Copy ကူးပြီး!";
            setTimeout(() => copyBtn.textContent = "Copy ကူးမည်", 2000);
        });

        function useForTTS() {
            document.getElementById('ttsInput').value = outputContainer.innerText;
            switchTab('tts');
        }

        // --- Text to Speech Logic ---
        const ttsBtn = document.getElementById('ttsBtn');
        const ttsBtnText = document.getElementById('ttsBtnText');
        const ttsBtnLoading = document.getElementById('ttsBtnLoading');
        const ttsInput = document.getElementById('ttsInput');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioResultSection = document.getElementById('audioResultSection');
        const downloadAudio = document.getElementById('downloadAudio');

        ttsBtn.addEventListener('click', async () => {
            const text = ttsInput.value.trim();
            if (!text) return alert("စာသားအရင်ထည့်ပါ");

            ttsBtn.disabled = true;
            ttsBtnText.textContent = "အသံဖိုင် ဖန်တီးနေသည်...";
            ttsBtnLoading.classList.remove('hidden');

            const voice = document.getElementById('voiceSelect').value;
            const style = document.getElementById('styleHint').value;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say in a ${style} manner: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
                        }
                    })
                });

                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const mimeType = result.candidates[0].content.parts[0].inlineData.mimeType;
                
                // Extract sample rate from mimeType (e.g., "audio/L16;rate=24000")
                const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || "24000");
                
                // Convert PCM to WAV for playback
                const wavBlob = pcmToWav(pcmData, sampleRate);
                const audioUrl = URL.createObjectURL(wavBlob);
                
                audioPlayer.src = audioUrl;
                downloadAudio.href = audioUrl;
                downloadAudio.download = "recap_voice.wav";
                audioResultSection.classList.remove('hidden');
                
            } catch (err) {
                alert("TTS Error: " + err.message);
            } finally {
                ttsBtn.disabled = false;
                ttsBtnText.textContent = "အသံဖိုင် ဖန်တီးမည်";
                ttsBtnLoading.classList.add('hidden');
            }
        });

        // Helper: PCM16 to WAV conversion
        function pcmToWav(base64Pcm, sampleRate) {
            const pcmBuffer = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);

            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + pcmBuffer.byteLength, true); // size
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true); // subchunk1 size
            view.setUint16(20, 1, true); // PCM format
            view.setUint16(22, 1, true); // mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); // byte rate
            view.setUint16(32, 2, true); // block align
            view.setUint16(34, 16, true); // bits per sample
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, pcmBuffer.byteLength, true);

            return new Blob([wavHeader, pcmBuffer], { type: 'audio/wav' });
        }
    </script>
</body>
</html>
